name: Auto-assign SSoC26 issues

on:
  issue_comment:
    types: [created]

permissions:
  issues: write

jobs:
  claim-issue:
    name: Claim unassigned SSoC26 issue
    if: ${{ github.event.issue.pull_request == null }}
    runs-on: ubuntu-latest
    steps:
      - name: Assign eligible issue claim
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const comment = context.payload.comment;
            const commenter = comment.user.login;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const commentBody = comment.body || '';
            const claimPatterns = [
              /(^|\s)\/claim(?:\s|[.!?]|$)/i,
              /\bclaim\b/i,
              /\bassign\s+me\b/i,
              /\bcan\s+i\s+be\s+assigned\b/i,
              /\bcould\s+i\s+be\s+assigned\b/i,
              /\bcan\s+i\s+work\b/i,
              /\bcould\s+i\s+work\b/i,
              /\bi\s+want\s+to\s+work\b/i,
              /\bi\s+would\s+like\s+to\s+work\b/i,
              /\bi['’]?d\s+like\s+to\s+work\b/i,
              /\binterested\s+in\s+working\b/i,
            ];
            if (!claimPatterns.some((pattern) => pattern.test(commentBody))) {
              return;
            }

            if (comment.user.type === 'Bot') {
              return;
            }

            const maintainerAssociations = new Set(['OWNER', 'MEMBER', 'COLLABORATOR']);
            if (commenter.toLowerCase() === owner.toLowerCase() || maintainerAssociations.has(comment.author_association)) {
              return;
            }

            const { data: currentIssue } = await github.rest.issues.get({
              owner,
              repo,
              issue_number: issue.number,
            });

            if (currentIssue.state !== 'open') {
              return;
            }

            const labels = currentIssue.labels.map((label) =>
              (typeof label === 'string' ? label : label.name).toLowerCase()
            );
            const hasLabel = (name) => labels.includes(name.toLowerCase());

            if (!hasLabel('SSoC26')) {
              return;
            }

            const createReply = async (body) => {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issue.number,
                body,
              });
            };

            if (currentIssue.assignees.length > 0) {
              await createReply(`@${commenter} this issue is already assigned. Please pick another open issue.`);
              return;
            }

            if (hasLabel('Hard')) {
              await createReply(`@${commenter} this issue is marked Hard, so a maintainer should assign it manually.`);
              return;
            }

            if (!hasLabel('Easy') && !hasLabel('Medium')) {
              return;
            }

            const assignedIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'open',
              labels: 'SSoC26',
              assignee: commenter,
              per_page: 100,
            });

            const otherAssignedIssue = assignedIssues.find((assignedIssue) =>
              assignedIssue.number !== issue.number && !assignedIssue.pull_request
            );

            if (otherAssignedIssue) {
              await createReply(`@${commenter} you already have an open SSoC26 issue assigned. Please finish that first or ask a maintainer before taking another one.`);
              return;
            }

            await github.rest.issues.addAssignees({
              owner,
              repo,
              issue_number: issue.number,
              assignees: [commenter],
            });

            await createReply([
              `Assigned to you, @${commenter}.`,
              '',
              'Please keep the first PR focused and link this issue in your PR.',
              '',
              'Before starting, read MEMACT.md and CONTRIBUTING.md.',
              '',
              'Main rule: activity is not identity. Use examples and tests carefully, avoid overconfident claims, and prefer user-readable context over raw private data.',
              '',
              'If there is no update for a few days, a maintainer may unassign so someone else can work on it.',
            ].join('\n'));
